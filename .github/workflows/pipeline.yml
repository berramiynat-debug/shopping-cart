name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests with pytest
      run: |
        pytest test_cart.py -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Trigger Render Deployment
      # This step triggers your deployment using a Render Deploy Hook.
      # You need to create a Deploy Hook in your Render dashboard and save it 
      # as a Repository Secret named RENDER_DEPLOY_HOOK_URL in GitHub.
      run: |
        echo "Triggering deployment to Render..."
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
